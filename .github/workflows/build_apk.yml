name: Build Jarvis APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: jarvis-android

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('jarvis-android/**/*.gradle*', 'jarvis-android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Baixar gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Criar local.properties com chave
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> local.properties

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: jarvis-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
